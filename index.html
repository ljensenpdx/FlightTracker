<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Live Flight Board</title>
    <style>
        body { background-color: #111; color: #fff; font-family: 'Courier New', monospace; padding: 2rem; margin: 0; }
        .header-controls { margin-bottom: 2rem; display: flex; gap: 10px; align-items: center; }
        select, input { padding: 10px; background: #222; border: 1px solid #444; color: white; }
        button { padding: 10px 20px; background-color: #333; color: white; border: 1px solid #444; cursor: pointer; text-transform: uppercase; }
        .board-header, .flight-row { display: grid; grid-template-columns: 1fr 1fr 1.5fr 1.5fr 2fr; gap: 2rem; padding: 12px 20px; align-items: center; }
        .board-header { color: #666; border-bottom: 2px solid #222; font-size: 0.9rem; text-transform: uppercase; }
        .flight-row { background-color: #050505; margin-top: 8px; border: 1px solid #1a1a1a; font-size: 1.4rem; }
        .flap { background: #222; padding: 8px; border-radius: 4px; text-align: center; }
    </style>
</head>
<body>
    <div class="header-controls">
        <select id="airlineSelect">
            <option value="AA">American (AA)</option>
            <option value="WN">Southwest (WN)</option>
            <option value="UA">United (UA)</option>
            <option value="DL">Delta (DL)</option>
            <option value="AS">Alaska (AS)</option>
            <option value="B6">JetBlue (B6)</option>
        </select>
        <input type="text" id="flightNum" placeholder="Flight Number (e.g. 3748)">
        <button onclick="trackFlight()">TRACK MCI ARRIVAL</button>
        <button onclick="clearAll()">CLEAR</button>
        <button onclick="refreshBoard()">REFRESH</button>
    </div>

    <div class="board-header"><div>Flight</div><div>ORIGIN</div><div>Scheduled</div><div>ETA</div><div>Status</div></div>
    <div id="flightBoard"></div>

    <script>
        const PROXY_URL = 'https://script.google.com/macros/s/AKfycbz-mFHDPIocQf-ri9G-AH-KXroNa7S5pHyNZkGMCEZhb255777K6GtVxolF4iHaaFa3kw/exec';

        async function trackFlight() {
            const airline = document.getElementById('airlineSelect').value;
            const number = document.getElementById('flightNum').value.trim();
            if (!number) return;
            
            const fullFlight = airline + number;
            let flights = JSON.parse(localStorage.getItem('myFlights') || '[]');
            
            if (!flights.includes(fullFlight)) {
                flights.push(fullFlight);
                localStorage.setItem('myFlights', JSON.stringify(flights));
            }
            document.getElementById('flightNum').value = '';
            await refreshBoard();
        }

        async function refreshBoard() {
            const board = document.getElementById('flightBoard');
            const flightList = JSON.parse(localStorage.getItem('myFlights') || '[]');
            board.innerHTML = '';
            
            for (const f of flightList) {
                try {
                    const res = await fetch(`${PROXY_URL}?flight=${f}`);
                    const data = await res.json();
                    if (data && data.length > 0) {
                        data.forEach(leg => renderRow(leg, f));
                    }
                } catch(e) { console.error("Refresh error:", e); }
            }
        }

function renderRow(f, num) {
            const sched = new Date(f.arrival.scheduledTime.local.replace(' ', 'T'));
            const eta = f.arrival.predictedTime ? new Date(f.arrival.predictedTime.local.replace(' ', 'T')) : sched;
            
            const fmt = (d) => d.toLocaleTimeString('en-US', { 
                timeZone: 'America/Chicago', hour: '2-digit', minute: '2-digit', hour12: false 
            });
            
            const isDelayed = eta > sched;
            document.getElementById('flightBoard').innerHTML += `
                <div class="flight-row" style="color: ${isDelayed ? '#f87171' : '#fff'}">
                    <div class="flap">${num}</div>
                    <div class="flap">${f.departure.airport.iata}</div> <div class="flap">${fmt(sched)}</div>
                    <div class="flap">${fmt(eta)}</div>
                    <div class="flap">${isDelayed ? 'DELAYED' : 'ON TIME'}</div>
                </div>`;
        }

        function clearAll() { localStorage.removeItem('myFlights'); location.reload(); }
        window.onload = refreshBoard;
    </script>
</body>
</html>
