<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Live Flight Board</title>
    <style>
        body { background-color: #111; color: #fff; font-family: 'Courier New', monospace; padding: 2rem; margin: 0; }
        .header-controls { margin-bottom: 2rem; display: flex; gap: 10px; align-items: center; }
        select, input { padding: 10px; background: #222; border: 1px solid #444; color: white; }
        button { padding: 10px 20px; background-color: #333; color: white; border: 1px solid #444; cursor: pointer; text-transform: uppercase; }
        .board-header, .flight-row { display: grid; grid-template-columns: 1fr 1fr 1.5fr 1.5fr 2fr; gap: 2rem; padding: 12px 20px; align-items: center; }
        .board-header { color: #666; border-bottom: 2px solid #222; font-size: 0.9rem; text-transform: uppercase; }
        .flight-row { background-color: #050505; margin-top: 8px; border: 1px solid #1a1a1a; font-size: 1.4rem; }
        .flap { background: #222; padding: 8px; border-radius: 4px; text-align: center; }
        small { display: block; font-size: 0.8rem; color: #888; margin-top: 4px; }
    </style>
</head>
<body>
    <div class="header-controls">
        <select id="airlineSelect" onchange="updatePlaceholder()">
            <option value="AC">Air Canada (AC)</option>
            <option value="AF">Air France (AF)</option>
            <option value="AS">Alaska Airlines (AS)</option>
            <option value="G4">Allegiant Air (G4)</option>
            <option value="AA">American Airlines (AA)</option>
            <option value="BA">British Airways (BA)</option>
            <option value="DL">Delta Air Lines (DL)</option>
            <option value="F9">Frontier Airlines (F9)</option>
            <option value="KL">KLM (KL)</option>
            <option value="LH">Lufthansa (LH)</option>
            <option value="WN">Southwest Airlines (WN)</option>
            <option value="UA">United Airlines (UA)</option>
            <option value="PRIVATE">Private (N-Number)</option>
        </select>
        <input type="text" id="flightNum" placeholder="Flight Number (e.g. 3748)">
        <button onclick="trackFlight()">TRACK</button>
        <button onclick="clearAll()">CLEAR</button>
        <button onclick="refreshBoard()">REFRESH</button>
    </div>

    <div class="board-header"><div>Flight</div><div>Origin</div><div>Scheduled</div><div>ETA</div><div>Status</div></div>
    <div id="flightBoard"></div>

    <script>
        const PROXY_URL = 'https://script.google.com/macros/s/AKfycbw12Zdm8lHgnAbDDpvuHlkbwR1lZPLHphv45Jo-GtjpAG6YYtR2Jd5zXwwLh_TQtYIPIg/exec';

        function updatePlaceholder() {
            const type = document.getElementById('airlineSelect').value;
            document.getElementById('flightNum').placeholder = (type === 'PRIVATE') ? "Enter Tail (e.g. N123AK)" : "Flight Number (e.g. 3748)";
        }

        async function trackFlight() {
            const type = document.getElementById('airlineSelect').value;
            const number = document.getElementById('flightNum').value.trim();
            if (!number) return;
            const identifier = (type === 'PRIVATE') ? number : (type + number);
            let flights = JSON.parse(localStorage.getItem('myFlights') || '[]');
            if (!flights.find(f => f.id === identifier)) {
                flights.push({ id: identifier, type: type });
                localStorage.setItem('myFlights', JSON.stringify(flights));
            }
            document.getElementById('flightNum').value = '';
            await refreshBoard();
        }

        async function refreshBoard() {
            const board = document.getElementById('flightBoard');
            const flightList = JSON.parse(localStorage.getItem('myFlights') || '[]');
            board.innerHTML = '';
            for (const item of flightList) {
                try {
                    const res = await fetch(`${PROXY_URL}?flight=${item.id}&type=${item.type}`);
                    const data = await res.json();
                    console.log(`Debug Data for ${item.id}:`, data); // Check console for raw API response
                    if (Array.isArray(data) && data.length > 0) {
                        data.forEach(leg => renderRow(leg, item.id));
                    }
                } catch(e) { console.error("Refresh error:", e); }
            }
        }

        function renderRow(f, id) {
            const status = f.status || 'Unknown';
            const sched = f.arrival?.scheduledTime?.local ? new Date(f.arrival.scheduledTime.local.replace(' ', 'T')) : new Date();
            const eta = f.arrival?.predictedTime?.local ? new Date(f.arrival.predictedTime.local.replace(' ', 'T')) : sched;
            const origin = f.departure?.airport?.iata || "---";
            
            // Flexible status logic
            const flyingKeywords = ['Active', 'EnRoute', 'InFlight', 'Departed'];
            const isInAir = flyingKeywords.includes(status);
            const isDelayed = eta > sched;
            
            let statusText = isDelayed ? 'DELAYED' : 'ON TIME';
            if (isInAir) statusText = isDelayed ? 'DELAYED - IN THE AIR' : 'IN THE AIR';
            else if (status === 'Scheduled' || status === 'Unknown') statusText = isDelayed ? 'DELAYED - ON THE GROUND' : 'ON THE GROUND';
            else if (status === 'Landed') statusText = 'LANDED';

            const parentFlight = f.codeshareFlightNumber ? `<small>(Op: ${f.codeshareFlightNumber})</small>` : "";
            const fmt = (d) => d.toLocaleTimeString('en-US', { timeZone: 'America/Chicago', hour: '2-digit', minute: '2-digit', hour12: false });
            
            document.getElementById('flightBoard').innerHTML += `
                <div class="flight-row" style="color: ${isDelayed ? '#f87171' : '#fff'}">
                    <div class="flap">${id}${parentFlight}</div>
                    <div class="flap">${origin}</div>
                    <div class="flap">${fmt(sched)}</div>
                    <div class="flap">${fmt(eta)}</div>
                    <div class="flap">${statusText}</div>
                </div>`;
        }

        function clearAll() { localStorage.removeItem('myFlights'); location.reload(); }
        window.onload = refreshBoard;
    </script>
</body>
</html>
